# Default canonical demo URL for the published sample site.
# The GitHub Pages workflow overrides this with `--base-url` so forks and custom domains can publish without rewriting this file.
base_url = "https://oddship.github.io/doordarshan-zola/"
title = "Doordarshan Demo"
description = "A retro Indian terminal and notebook Zola theme with warm terracotta accents."
author = "Rohan Verma"
default_language = "en"
compile_sass = true
minify_html = true
generate_feeds = true
feed_filenames = ["rss.xml"]
build_search_index = true

[markdown]
render_emoji = true
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true

[[taxonomies]]
name = "tags"

[slugify]
paths = "on"
taxonomies = "on"
anchors = "on"

[extra]
author = "Doordarshan"
bio = "A retro terminal-inspired notebook theme for Zola."
handwritten_font = "https://fonts.googleapis.com/css2?family=Shrikhand&display=swap"
nav_brand = "~/dd"
github = "https://github.com/oddship/doordarshan-zola"
twitter_handle = "@getzola"

[extra.doordarshan.sections]
blog = "blog/_index.md"
pages = "pages/_index.md"

[extra.doordarshan.features]
pages_search = true
site_search = true

[extra.doordarshan.assets]
social_image = "/images/social-card.png"

[extra.doordarshan.homepage]
show_recent = true
recent_limit = 5

[[extra.doordarshan.homepage.links]]
label = "Blog"
url = "/blog/"

[[extra.doordarshan.homepage.links]]
